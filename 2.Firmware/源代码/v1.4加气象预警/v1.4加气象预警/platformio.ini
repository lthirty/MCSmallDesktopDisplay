[platformio]
default_envs = esp12e
src_dir = SmallDesktopDisplay

[env:esp12e]
platform = espressif8266@2.6.3
board = esp12e
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_extra_dirs =
  ../../V1.4源码(web网页设置+web配网)-无wifi休眠/libraries
lib_ldf_mode = deep+
build_flags =
  -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
